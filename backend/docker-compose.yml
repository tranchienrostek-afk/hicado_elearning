version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: elearning_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: elearning
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: .
    container_name: elearning_backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/elearning?schema=public
      - JWT_SECRET=${JWT_SECRET:-elearning-local-dev-secret}
      - PORT=5000
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
