version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: hicado_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: elearning
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hicado_app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/elearning?schema=public
      - JWT_SECRET=hicado-elearning-2026-xK9mP3qR7wL2nT5vY8jA
      - PORT=5000
      - NODE_ENV=production
      # Zalo OA Config (copied from .env)
      - APP_ID_HIKICO=1244744671713878169
      - SECRECT_KEY_HIKICO=l3c5WUVIgcDtkOQQeUM1
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
