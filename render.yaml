services:
  # Backend API (Docker)
  - type: web
    name: elearning-backend
    env: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      # Database now hosted on Supabase (not a Render-managed Postgres) — set both
      # manually in the Render dashboard from the Supabase project's connection info:
      #   DATABASE_URL — the pooled/Supavisor connection string (port 6543, ?pgbouncer=true),
      #                  used by the running app.
      #   DIRECT_URL   — the direct connection string (port 5432), used only for
      #                  `prisma migrate deploy` at container startup.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: SEPAY_API_KEY
        sync: false
      - key: BANK_BIN
        sync: false
      - key: BANK_ACC
        sync: false
      - key: BANK_NAME
        sync: false
      - key: BANK_LABEL
        sync: false
      - key: SEPAY_ACCOUNT_NUMBER
        sync: false
      - key: ZALO_OA_ID
        sync: false
      - key: ZALO_ACCESS_TOKEN
        sync: false
      - key: APP_URL
        value: https://hicado-elearning.onrender.com

