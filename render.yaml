databases:
  - name: elearning-db
    databaseName: elearning
    plan: free

services:
  # Backend API (Docker)
  - type: web
    name: elearning-backend
    env: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elearning-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: SEPAY_API_KEY
        sync: false
      - key: BANK_BIN
        sync: false
      - key: BANK_ACC
        sync: false
      - key: BANK_NAME
        sync: false
      - key: BANK_LABEL
        sync: false
      - key: SEPAY_ACCOUNT_NUMBER
        sync: false
      - key: ZALO_OA_ID
        sync: false
      - key: ZALO_ACCESS_TOKEN
        sync: false
      - key: APP_URL
        value: https://hicado-elearning.onrender.com

