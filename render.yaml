databases:
  - name: elearning-db
    databaseName: elearning
    user: postgres
    plan: free

services:
  # 1. Backend Web Service
  - type: web
    name: elearning-backend
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elearning-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # 2. Frontend Static Site
  - type: static
    name: elearning-frontend
    plan: free
    rootDir: ui_components
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://elearning-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
