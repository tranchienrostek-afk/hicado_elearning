services:
  # 1. PostgreSQL Database
  - type: database
    name: elearning-db
    databaseName: elearning
    user: postgres
    plan: free # Change to starter for production

  # 2. Backend Web Service (Node.js + Prisma)
  - type: web
    name: elearning-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elearning-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # 3. Frontend Static Site (Vite)
  - type: web
    name: elearning-frontend
    env: static
    plan: free
    rootDir: ui_components
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      # Proxy /api requests to the backend service
      - type: rewrite
        source: /api/*
        destination: https://elearning-backend.onrender.com/api/*
      # Single Page Application (SPA) routing
      - type: rewrite
        source: /*
        destination: /index.html
