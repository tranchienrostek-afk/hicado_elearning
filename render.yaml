databases:
  - name: elearning-db
    databaseName: elearning
    plan: free

services:
  # Backend API (Node.js)
  - type: web
    name: elearning-backend
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elearning-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend (Static Site)
  - type: web
    name: elearning-frontend
    runtime: static
    rootDir: ui_components
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://elearning-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
